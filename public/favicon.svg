<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- dirt base -->
  <rect x="0" y="5" width="16" height="11" fill="#8b5a2b"/>
  <!-- grass top -->
  <rect x="0" y="0" width="16" height="4" fill="#5cb85c"/>
  <!-- dark grass band (the classic grass-block stripe) -->
  <rect x="0" y="4" width="16" height="1" fill="#3a8a3a"/>

  <!-- grass highlights -->
  <rect x="1" y="1" width="1" height="1" fill="#7dd47d"/>
  <rect x="5" y="0" width="1" height="1" fill="#7dd47d"/>
  <rect x="10" y="2" width="1" height="1" fill="#7dd47d"/>
  <rect x="13" y="1" width="1" height="1" fill="#7dd47d"/>
  <rect x="3" y="3" width="1" height="1" fill="#7dd47d"/>
  <rect x="8" y="3" width="1" height="1" fill="#7dd47d"/>
  <!-- grass darks -->
  <rect x="7" y="2" width="1" height="1" fill="#3a8a3a"/>
  <rect x="12" y="3" width="1" height="1" fill="#3a8a3a"/>
  <rect x="2" y="2" width="1" height="1" fill="#3a8a3a"/>
  <rect x="15" y="3" width="1" height="1" fill="#3a8a3a"/>

  <!-- dirt highlights -->
  <rect x="2" y="7" width="1" height="1" fill="#b07a48"/>
  <rect x="9" y="9" width="1" height="1" fill="#b07a48"/>
  <rect x="14" y="12" width="1" height="1" fill="#b07a48"/>
  <rect x="5" y="13" width="1" height="1" fill="#b07a48"/>
  <rect x="7" y="6" width="1" height="1" fill="#b07a48"/>
  <rect x="11" y="14" width="1" height="1" fill="#b07a48"/>
  <!-- dirt darks (pebbles) -->
  <rect x="3" y="11" width="2" height="1" fill="#5d3a1a"/>
  <rect x="10" y="10" width="2" height="1" fill="#5d3a1a"/>
  <rect x="6" y="14" width="2" height="1" fill="#5d3a1a"/>
  <rect x="13" y="7" width="1" height="2" fill="#5d3a1a"/>
  <rect x="1" y="14" width="1" height="1" fill="#5d3a1a"/>

  <!-- subtle outline so it pops in browser tabs -->
  <rect x="0" y="0" width="16" height="1" fill="#3a8a3a"/>
  <rect x="0" y="15" width="16" height="1" fill="#5d3a1a"/>
  <rect x="0" y="0" width="1" height="16" fill="#000" fill-opacity="0.15"/>
  <rect x="15" y="0" width="1" height="16" fill="#000" fill-opacity="0.15"/>
</svg>
